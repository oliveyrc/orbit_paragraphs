<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Orbit Paragraphs logo</title>
  <desc id="desc">A circular orbit mark surrounding layered paragraph content blocks.</desc>
  <defs>
    <linearGradient id="orbit-gradient" x1="78" y1="96" x2="434" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21A8A3"/>
      <stop offset="0.52" stop-color="#3164D4"/>
      <stop offset="1" stop-color="#6D4CC2"/>
    </linearGradient>
    <linearGradient id="panel-gradient" x1="158" y1="126" x2="354" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="block-gradient" x1="180" y1="158" x2="334" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FBFF"/>
      <stop offset="1" stop-color="#E5EEFF"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#14213D" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#F7FAFC"/>

  <g fill="none" stroke="url(#orbit-gradient)" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="190" ry="92" stroke-width="22" transform="rotate(-24 256 256)"/>
    <ellipse cx="256" cy="256" rx="190" ry="92" stroke-width="14" opacity="0.28" transform="rotate(36 256 256)"/>
  </g>

  <circle cx="406" cy="181" r="28" fill="#21A8A3"/>
  <circle cx="104" cy="323" r="18" fill="#6D4CC2"/>

  <g filter="url(#soft-shadow)">
    <rect x="156" y="122" width="216" height="268" rx="28" fill="url(#panel-gradient)" stroke="#D9E3F2" stroke-width="4"/>

    <rect x="188" y="158" width="136" height="52" rx="14" fill="url(#block-gradient)" stroke="#C8D6EA" stroke-width="3"/>
    <rect x="210" y="179" width="92" height="10" rx="5" fill="#3164D4"/>

    <rect x="188" y="230" width="136" height="52" rx="14" fill="url(#block-gradient)" stroke="#C8D6EA" stroke-width="3"/>
    <rect x="208" y="249" width="42" height="14" rx="7" fill="#21A8A3"/>
    <rect x="262" y="249" width="42" height="14" rx="7" fill="#C8D6EA"/>

    <rect x="188" y="302" width="136" height="52" rx="14" fill="url(#block-gradient)" stroke="#C8D6EA" stroke-width="3"/>
    <rect x="210" y="320" width="86" height="10" rx="5" fill="#6D4CC2"/>
    <rect x="210" y="336" width="54" height="8" rx="4" fill="#C8D6EA"/>
  </g>

  <g fill="#14213D">
    <rect x="340" y="164" width="42" height="42" rx="12"/>
    <rect x="340" y="235" width="42" height="42" rx="12"/>
    <rect x="340" y="306" width="42" height="42" rx="12"/>
  </g>
  <path d="M355 185h12M361 179v12M355 256h12M361 250v12M355 327h12M361 321v12" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
</svg>
